apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-app
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.app.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "mcp-hosting.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
