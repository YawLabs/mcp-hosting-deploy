{{- if .Values.caddy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-caddy
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  replicas: {{ .Values.caddy.replicas }}
  selector:
    matchLabels:
      {{- include "mcp-hosting.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: caddy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "mcp-hosting.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: caddy
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/caddy-configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: caddy
          image: {{ .Values.caddy.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              # Caddy needs NET_BIND_SERVICE to listen on 80/443 as a
              # non-root user. Drop everything else.
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
          startupProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: https
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: https
            periodSeconds: 10
          resources:
            {{- toYaml .Values.caddy.resources | nindent 12 }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ include "mcp-hosting.fullname" . }}-caddy
        - name: caddy-data
          persistentVolumeClaim:
            claimName: {{ include "mcp-hosting.fullname" . }}-caddy-data
        - name: caddy-config
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-caddy-data
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.caddy.storage | default "1Gi" }}
  {{- if .Values.caddy.storageClass }}
  storageClassName: {{ .Values.caddy.storageClass }}
  {{- end }}
{{- end }}
