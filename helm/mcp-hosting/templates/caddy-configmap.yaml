{{- if .Values.caddy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-caddy
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
data:
  Caddyfile: |
    {
      admin off
    }

    # Reusable MCP-aware reverse proxy snippet
    (mcp_proxy) {
      reverse_proxy {{ include "mcp-hosting.fullname" . }}-app:{{ .Values.app.port }} {
        # SSE / Streamable HTTP: disable buffering so events stream in real time
        flush_interval -1
        transport http {
          keepalive 30s
          keepalive_idle_conns 10
        }
        header_up MCP-Session-Id {header.MCP-Session-Id}
        header_up MCP-Protocol-Version {header.MCP-Protocol-Version}
      }

      header {
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        Referrer-Policy "strict-origin-when-cross-origin"
        Strict-Transport-Security "max-age=31536000; includeSubDomains"
      }
    }

    # Root domain — dashboard + API (single domain; consumer self-host has no wildcard need)
    {{ .Values.domain }} {
      import mcp_proxy
    }
{{- end }}
