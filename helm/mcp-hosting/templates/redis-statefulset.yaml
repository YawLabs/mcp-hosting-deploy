{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-redis
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "mcp-hosting.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "mcp-hosting.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "mcp-hosting.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          # --requirepass is unconditional: the chart fails at render
          # time if redis.authToken is unset (see the app Secret), so we
          # never reach here without a token. Mirrors the Compose stance.
          args:
            - --requirepass
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-hosting.fullname" . }}-redis
                  key: auth-token
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          # valkey-cli is the primary CLI in valkey/valkey images.
          # Matches the Compose path; redis-cli still works as a compat
          # symlink but using the native name avoids surprises if upstream
          # ever drops the symlink.
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - -a
                - "$(REDIS_PASSWORD)"
                - --no-auth-warning
                - ping
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - -a
                - "$(REDIS_PASSWORD)"
                - --no-auth-warning
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.storageClass }}
        storageClassName: {{ .Values.redis.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-redis
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
stringData:
  auth-token: {{ required "redis.authToken is required when redis.enabled=true. Generate one with: openssl rand -hex 24" .Values.redis.authToken | quote }}
{{- end }}
