{{/*
  Render whenever the app has more than one replica, regardless of
  whether replicas come from .Values.app.replicas (autoscaling off) or
  .Values.autoscaling.minReplicas (autoscaling on). A 2-replica deploy
  with no PDB is fully evictable during node drain — both pods can go
  at once.
*/}}
{{- $replicaCount := ternary (int .Values.autoscaling.minReplicas) (int .Values.app.replicas) .Values.autoscaling.enabled -}}
{{- if gt $replicaCount 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-app
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "mcp-hosting.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
{{- end }}
