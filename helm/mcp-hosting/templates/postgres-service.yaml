{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-postgres
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "mcp-hosting.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
