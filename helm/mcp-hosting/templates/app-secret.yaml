apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-app
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "mcp-hosting.databaseUrl" . | quote }}
  # Empty defaults are deliberately rejected at render time. Letting an
  # `helm install` succeed with an empty cookieSecret would let an attacker
  # forge sessions; an empty licenseKey would crash-loop the pod with a
  # less obvious error than this template-time failure.
  COOKIE_SECRET: {{ required "app.cookieSecret is required (32+ chars). Generate one with: openssl rand -hex 32" .Values.app.cookieSecret | quote }}
  GITHUB_CLIENT_ID: {{ required "app.githubClientId is required. Register an OAuth app at https://github.com/settings/developers" .Values.app.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ required "app.githubClientSecret is required (paired with app.githubClientId)" .Values.app.githubClientSecret | quote }}
  {{- if .Values.redis.enabled }}
  REDIS_AUTH_TOKEN: {{ required "redis.authToken is required when redis.enabled=true (mirrors the Compose --requirepass guard so Valkey can't boot unauthenticated). Generate one with: openssl rand -hex 24" .Values.redis.authToken | quote }}
  {{- else if .Values.externalRedis.password }}
  REDIS_AUTH_TOKEN: {{ .Values.externalRedis.password | quote }}
  {{- end }}
  MCP_HOSTING_LICENSE_KEY: {{ required "licenseKey is required. Get yours at https://mcp.hosting/#pricing → Settings → Self-host (format: mcph_sh_<hex>)" .Values.licenseKey | quote }}
  {{- if .Values.email.ses.accessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.email.ses.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.email.ses.secretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.email.ses.secretAccessKey | quote }}
  {{- end }}
  {{- if .Values.oidc.issuer }}
  OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  OIDC_CLIENT_ID: {{ required "oidc.clientId is required when oidc.issuer is set (all three OIDC values must be set together — see docs/oidc-setup.md)" .Values.oidc.clientId | quote }}
  OIDC_CLIENT_SECRET: {{ required "oidc.clientSecret is required when oidc.issuer is set (all three OIDC values must be set together — see docs/oidc-setup.md)" .Values.oidc.clientSecret | quote }}
  {{- end }}
