apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-hosting.fullname" . }}-app
  namespace: {{ include "mcp-hosting.namespace" . }}
  labels:
    {{- include "mcp-hosting.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "mcp-hosting.databaseUrl" . | quote }}
  COOKIE_SECRET: {{ .Values.app.cookieSecret | quote }}
  GITHUB_CLIENT_ID: {{ .Values.app.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.app.githubClientSecret | quote }}
  {{- if and .Values.redis.enabled .Values.redis.authToken }}
  REDIS_AUTH_TOKEN: {{ .Values.redis.authToken | quote }}
  {{- end }}
  {{- if and (not .Values.redis.enabled) .Values.externalRedis.password }}
  REDIS_AUTH_TOKEN: {{ .Values.externalRedis.password | quote }}
  {{- end }}
  {{- if .Values.licenseKey }}
  LICENSE_KEY: {{ .Values.licenseKey | quote }}
  {{- end }}
  {{- if .Values.app.lemonSqueezyApiKey }}
  LEMONSQUEEZY_API_KEY: {{ .Values.app.lemonSqueezyApiKey | quote }}
  {{- end }}
  {{- if .Values.app.lemonSqueezyWebhookSecret }}
  LEMONSQUEEZY_WEBHOOK_SECRET: {{ .Values.app.lemonSqueezyWebhookSecret | quote }}
  {{- end }}
  {{- if .Values.app.lemonSqueezyStoreId }}
  LEMONSQUEEZY_STORE_ID: {{ .Values.app.lemonSqueezyStoreId | quote }}
  {{- end }}
  {{- if .Values.app.githubAppId }}
  GITHUB_APP_ID: {{ .Values.app.githubAppId | quote }}
  {{- end }}
  {{- if .Values.app.githubAppClientId }}
  GITHUB_APP_CLIENT_ID: {{ .Values.app.githubAppClientId | quote }}
  {{- end }}
  {{- if .Values.app.githubAppWebhookSecret }}
  GITHUB_APP_WEBHOOK_SECRET: {{ .Values.app.githubAppWebhookSecret | quote }}
  {{- end }}
  {{- if .Values.app.githubAppPrivateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.app.githubAppPrivateKey | quote }}
  {{- end }}
  {{- if .Values.app.buildSecret }}
  BUILD_SECRET: {{ .Values.app.buildSecret | quote }}
  {{- end }}
  {{- if .Values.email.ses.accessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.email.ses.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.email.ses.secretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.email.ses.secretAccessKey | quote }}
  {{- end }}
