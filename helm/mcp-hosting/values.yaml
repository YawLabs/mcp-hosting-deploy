# =============================================================================
# mcp.hosting Helm Values
# =============================================================================
#
# Recommended production architecture:
#   - Database:  External managed service (AWS RDS, Cloud SQL, AlloyDB, etc.)
#   - Cache:     In-cluster Valkey (easy to recover, no persistence concerns)
#   - TLS:       In-cluster Caddy, Let's Encrypt HTTP challenge, single domain
#
# By default this chart expects an external database. Set the connection
# details under `externalDatabase`. For local development or testing you
# can flip `postgres.enabled: true` to run Postgres inside the cluster.
#
# =============================================================================

# -- Domain configuration
# Your root domain — the dashboard + mcph orchestrator live here.
domain: mcp.example.com

# -- License key (REQUIRED — self-host requires a Team subscription)
# Get yours at https://mcp.hosting/#pricing → Settings → Self-host.
# Format: mcph_sh_<hex>
licenseKey: ""

# -- Namespace (created if it doesn't exist)
namespace: mcp-hosting

# =============================================================================
# Image pull authentication (REQUIRED — image is private)
# =============================================================================
# The mcp-hosting image on GHCR is gated by your self-host GHCR token
# (issued alongside the license key at Settings → Self-host on mcp.hosting).
# Create an imagePullSecret in your cluster once before `helm install`:
#
#   kubectl create secret docker-registry ghcr-mcp-hosting \
#     --namespace mcp-hosting \
#     --docker-server=ghcr.io \
#     --docker-username=self-host \
#     --docker-password="$MCPH_GHCR_TOKEN"
#
# Then reference it here:
imagePullSecrets:
  - name: ghcr-mcp-hosting

# =============================================================================
# App (mcp-hosting API + dashboard)
# =============================================================================
app:
  image: ghcr.io/yawlabs/mcp-hosting
  tag: latest
  replicas: 2
  port: 3000

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -- Environment (NODE_ENV)
  nodeEnv: production

  # -- GitHub OAuth (required)
  githubClientId: ""
  githubClientSecret: ""

  # -- Cookie signing secret (32+ characters, required)
  cookieSecret: ""

# =============================================================================
# PostgreSQL (in-cluster -- for development/testing ONLY)
# =============================================================================
# Default: use an external database (RDS, Cloud SQL, etc.)
# Set postgres.enabled=true only for development/testing
postgres:
  enabled: false  # DO NOT run Postgres in Kubernetes for production
  image: postgres:18-alpine
  storage: 10Gi
  storageClass: ""
  database: mcphosting
  username: mcphosting
  # -- IMPORTANT: Set a strong password before deploying!
  password: ""

# =============================================================================
# External database (recommended for production)
# =============================================================================
# IMPORTANT: the app's startup migrations run `CREATE EXTENSION IF NOT
# EXISTS vector` for semantic-rerank / pgvector features. Enable pgvector
# on your managed Postgres BEFORE deploying — otherwise the first pod
# crash-loops with "extension vector is not available". AWS RDS, Cloud
# SQL, Supabase, Azure Database, Crunchy Bridge all support it; check
# the provider docs. For RDS, pgvector is available on recent 15/16/17/18
# minor versions via the rds_pgvector parameter.
externalDatabase:
  host: ""       # e.g. my-db.abc123.us-west-2.rds.amazonaws.com
  port: 5432
  database: mcphosting
  username: mcphosting
  password: ""
  sslMode: require   # set to "disable" for internal cluster Postgres without TLS

# =============================================================================
# Redis / Valkey (in-cluster)
# =============================================================================
redis:
  enabled: true  # In-cluster Valkey is fine for production
  image: valkey/valkey:8.0-alpine
  storage: 1Gi
  storageClass: ""
  # -- Auth token for Redis (optional, recommended in production)
  authToken: ""

# =============================================================================
# External Redis (optional -- only if you prefer a managed cache)
# =============================================================================
externalRedis:
  host: ""       # e.g. my-cache.abc123.0001.usw2.cache.amazonaws.com
  port: 6379
  password: ""
  # Set false for managed Redis without TLS (e.g. Memorystore basic tier,
  # ElastiCache without in-transit encryption). Most managed Redis offerings
  # default to TLS on — leave true unless you've explicitly disabled it.
  tls: true

# =============================================================================
# Caddy (reverse proxy + automatic TLS)
# =============================================================================
caddy:
  enabled: true
  image: caddy:2-alpine
  replicas: 2
  serviceType: LoadBalancer
  # -- Persistent storage for TLS certificates (prevents re-issuance on restart)
  storage: 1Gi
  storageClass: ""

  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

# =============================================================================
# Email (for magic link authentication)
# =============================================================================
email:
  from: noreply@mcp.example.com
  ses:
    region: us-east-1
    accessKeyId: ""
    secretAccessKey: ""

# =============================================================================
# OIDC SSO (optional — Google, Okta, Azure AD, Authentik, Keycloak, etc.)
# =============================================================================
# When `issuer` is set, the sign-in page shows a "Sign in with SSO" button
# that redirects to your OIDC provider. All three values must be set
# together — leave `issuer` empty to disable SSO and rely on magic-link
# email + (optional) GitHub OAuth instead.
#
# Provider callback URL pattern:  https://<domain>/auth/oidc/callback
# Setup walkthrough:              docs/oidc-setup.md
oidc:
  issuer: ""        # e.g. https://accounts.google.com  or  https://<tenant>.okta.com
  clientId: ""      # OIDC application client ID from your provider
  clientSecret: ""  # OIDC application client secret (kept in a Secret object)

# =============================================================================
# Monitoring
# =============================================================================
monitoring:
  # Enable Prometheus ServiceMonitor (requires prometheus-operator CRDs)
  serviceMonitor:
    enabled: false
    # Optional extra labels — set these to whatever your prometheus
    # operator's serviceMonitorSelector matches on (e.g. release: prom).
    labels: {}
    # How often Prometheus scrapes /metrics. Match your environment's
    # global scrape interval if you have one.
    interval: 30s
    scrapeTimeout: 10s

# =============================================================================
# Autoscaling (HPA for the app deployment)
# =============================================================================
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 70
