# Source: mcp-hosting/templates/network-policy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-hosting-app
  namespace: mcp-hosting
  labels:
    helm.sh/chart: mcp-hosting-0.1.0
    app.kubernetes.io/name: mcp-hosting
    app.kubernetes.io/instance: mcp-hosting
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-hosting
      app.kubernetes.io/instance: mcp-hosting
      app.kubernetes.io/component: app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Caddy
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-hosting
              app.kubernetes.io/instance: mcp-hosting
              app.kubernetes.io/component: caddy
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-hosting
              app.kubernetes.io/instance: mcp-hosting
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis/Valkey
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-hosting
              app.kubernetes.io/instance: mcp-hosting
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow HTTPS egress (GitHub OAuth, LemonSqueezy, SES, upstream MCP servers)
    - to: []
      ports:
        - protocol: TCP
          port: 443
