# Source: mcp-hosting/templates/caddy-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-hosting-caddy
  namespace: mcp-hosting
  labels:
    helm.sh/chart: mcp-hosting-0.1.0
    app.kubernetes.io/name: mcp-hosting
    app.kubernetes.io/instance: mcp-hosting
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: caddy
data:
  Caddyfile: |
    {
      admin off
    }

    # Reusable MCP-aware reverse proxy snippet
    (mcp_proxy) {
      reverse_proxy mcp-hosting-app:3000 {
        # SSE / Streamable HTTP: disable buffering so events stream in real time
        flush_interval -1
        transport http {
          keepalive 30s
          keepalive_idle_conns 10
        }
        header_up MCP-Session-Id {header.MCP-Session-Id}
        header_up MCP-Protocol-Version {header.MCP-Protocol-Version}
      }

      header {
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        Referrer-Policy "strict-origin-when-cross-origin"
        Strict-Transport-Security "max-age=31536000; includeSubDomains"
      }
    }

    # Root domain — dashboard + API (single domain; consumer self-host has no wildcard need)
    test.example.com {
      import mcp_proxy
    }
