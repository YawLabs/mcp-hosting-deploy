spec:
  name: mcp-hosting
  services:
    - name: mcp-hosting
      dockerfile_path: Dockerfile
      git:
        branch: master
        repo_clone_url: https://github.com/YawLabs/mcp-hosting-deploy.git
      http_port: 3000
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-1gb
      health_check:
        http_path: /health
      envs:
        - key: BASE_DOMAIN
          scope: RUN_TIME
          type: GENERAL
          value: ${APP_DOMAIN}
        - key: COOKIE_SECRET
          scope: RUN_TIME
          type: SECRET
          value: CHANGE_ME
        - key: DATABASE_URL
          scope: RUN_TIME
          value: ${db.DATABASE_URL}
        - key: REDIS_URL
          scope: RUN_TIME
          value: ${redis.DATABASE_URL}
        - key: MCP_HOSTING_LICENSE_KEY
          scope: RUN_TIME
          type: SECRET
          value: ""
        - key: NODE_ENV
          scope: RUN_TIME
          value: production
  databases:
    - name: db
      engine: PG
      version: "17"
    - name: redis
      engine: REDIS
      version: "7"
