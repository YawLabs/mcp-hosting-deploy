apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mcp-hosting
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 250
      timeoutSeconds: 3600
      containers:
        # Point at your Artifact Registry mirror of the private GHCR image —
        # see README.md "Mirror the private image into Artifact Registry".
        # Example: us-central1-docker.pkg.dev/PROJECT_ID/mcp-hosting/mcp-hosting:latest
        - image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/mcp-hosting/mcp-hosting:latest
          ports:
            - containerPort: 3000
          env:
            - name: SELF_HOSTED
              value: "true"
            - name: NODE_ENV
              value: production
            # Cloud SQL and Memorystore both enforce TLS on their default
            # endpoints — don't override to `false` unless you're using
            # a private-IP instance without it.
            - name: DATABASE_SSL
              value: "require"
            - name: REDIS_TLS
              value: "true"
            - name: BASE_DOMAIN
              value: "" # Set via gcloud: --set-env-vars BASE_DOMAIN=mcp.example.com
            # The following are typically set via --set-secrets in the
            # gcloud deploy command (see README.md) rather than as
            # plain env vars. Listed here as placeholders so operators
            # using the declarative yaml path don't miss them.
            # - name: DATABASE_URL           # (secret) postgresql://...
            # - name: COOKIE_SECRET          # (secret) openssl rand -hex 32
            # - name: MCP_HOSTING_LICENSE_KEY # (secret) mcph_sh_...
            # - name: GITHUB_CLIENT_ID       # (secret) OAuth app client ID
            # - name: GITHUB_CLIENT_SECRET   # (secret) OAuth app client secret
            # - name: AWS_ACCESS_KEY_ID      # (secret) IAM key for SES
            # - name: AWS_SECRET_ACCESS_KEY  # (secret) IAM secret for SES
            - name: AWS_REGION
              value: "us-east-1"
            - name: EMAIL_FROM
              value: "" # Verified SES sender address
            - name: REDIS_HOST
              value: "" # Memorystore IP
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_AUTH_TOKEN
              value: "" # Memorystore AUTH string
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 15
