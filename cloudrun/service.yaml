apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mcp-hosting
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 250
      timeoutSeconds: 3600
      containers:
        # Point at your Artifact Registry mirror of the private GHCR image —
        # see README.md "Mirror the private image into Artifact Registry".
        # Example: us-central1-docker.pkg.dev/PROJECT_ID/mcp-hosting/mcp-hosting:latest
        - image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/mcp-hosting/mcp-hosting:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: BASE_URL
              value: "" # Set via gcloud: --set-env-vars BASE_URL=https://mcp.example.com
            - name: DOMAIN
              value: "" # Set via gcloud
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 15
