AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  mcp.hosting — Single EC2 instance deployment.
  Provisions an ARM64 Graviton instance running Docker Compose with
  PostgreSQL, Valkey, and the mcp-hosting application.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  DomainName:
    Type: String
    Description: Fully-qualified domain name for the mcp.hosting instance (e.g. mcp.example.com)
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9\-\.]+[a-zA-Z0-9]$
    ConstraintDescription: Must be a valid domain name.

  LicenseKey:
    Type: String
    Default: ""
    Description: Optional license key for proxy features.
    NoEcho: true

  InstanceType:
    Type: String
    Default: t4g.small
    Description: EC2 instance type (must be ARM64/Graviton).
    AllowedValues:
      - t4g.micro
      - t4g.small
      - t4g.medium
      - t4g.large
      - t4g.xlarge
      - c7g.medium
      - c7g.large

  KeyPairName:
    Type: String
    Default: ""
    Description: Optional EC2 key pair name for SSH access. Leave empty to disable SSH.

  AllowedSSHCidr:
    Type: String
    Default: ""
    Description: CIDR block allowed to SSH (e.g. 203.0.113.10/32). Leave empty to use SSM instead.

  EmailFrom:
    Type: String
    Default: ""
    Description: Sender email address. Defaults to noreply@{DomainName} if left empty.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]
  HasSSHCidr: !Not [!Equals [!Ref AllowedSSHCidr, ""]]
  EnableSSH: !And
    - !Condition HasKeyPair
    - !Condition HasSSHCidr
  HasLicenseKey: !Not [!Equals [!Ref LicenseKey, ""]]
  HasEmailFrom: !Not [!Equals [!Ref EmailFrom, ""]]

# ---------------------------------------------------------------------------
# Mappings — Ubuntu 24.04 LTS ARM64 AMIs (canonical, hvm:ebs-ssd)
# ---------------------------------------------------------------------------
Mappings:
  RegionToAMI:
    us-east-1:
      AMI: resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id
    us-east-2:
      AMI: resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id
    us-west-1:
      AMI: resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id
    us-west-2:
      AMI: resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id
    eu-west-1:
      AMI: resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id
    eu-central-1:
      AMI: resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id
    ap-southeast-1:
      AMI: resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id
    ap-northeast-1:
      AMI: resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- VPC (simple single-subnet setup) ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "mcp-hosting-${DomainName}"
        - Key: Project
          Value: mcp-hosting

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Project
          Value: mcp-hosting

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: mcp-hosting-public
        - Key: Project
          Value: mcp-hosting

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Project
          Value: mcp-hosting

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --- Security Group ---
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, HTTPS, and optionally SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - !If
          - EnableSSH
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref AllowedSSHCidr
            Description: SSH
          - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: mcp-hosting

  # --- IAM Role (for SSM + CloudWatch) ---
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Project
          Value: mcp-hosting

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # --- EC2 Instance ---
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionToAMI, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "mcp-hosting-${DomainName}"
        - Key: Project
          Value: mcp-hosting
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -euo pipefail
              exec > /var/log/mcp-hosting-init.log 2>&1

              echo "=== mcp.hosting EC2 bootstrap ==="

              # --- System updates & Docker ---
              apt-get update -y
              apt-get install -y ca-certificates curl gnupg lsb-release

              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | \
                tee /etc/apt/sources.list.d/docker.list > /dev/null

              apt-get update -y
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

              systemctl enable docker
              systemctl start docker

              # --- Generate secrets ---
              DB_PASSWORD=$(openssl rand -hex 24)
              COOKIE_SECRET=$(openssl rand -hex 32)

              EMAIL_FROM="${EmailFromResolved}"

              # --- Write docker-compose.yml ---
              mkdir -p /opt/mcp-hosting
              cat > /opt/mcp-hosting/docker-compose.yml <<'COMPOSE'
              services:
                postgres:
                  image: postgres:18-alpine
                  restart: always
                  environment:
                    POSTGRES_DB: mcp_hosting
                    POSTGRES_USER: mcp_admin
                    POSTGRES_PASSWORD: ${!DB_PASSWORD}
                  volumes:
                    - pgdata:/var/lib/postgresql/data
                  healthcheck:
                    test: ["CMD-SHELL", "pg_isready -U mcp_admin -d mcp_hosting"]
                    interval: 5s
                    retries: 5

                valkey:
                  image: valkey/valkey:8.0-alpine
                  restart: always
                  healthcheck:
                    test: ["CMD", "valkey-cli", "ping"]
                    interval: 5s
                    retries: 5

                app:
                  image: ghcr.io/yawlabs/mcp-hosting:latest
                  restart: always
                  ports:
                    - "80:3000"
                    - "443:3000"
                  environment:
                    NODE_ENV: production
                    PORT: "3000"
                    BASE_DOMAIN: ${!DOMAIN_NAME}
                    DATABASE_URL: postgresql://mcp_admin:${!DB_PASSWORD}@postgres:5432/mcp_hosting?sslmode=disable
                    DATABASE_SSL: "false"
                    REDIS_HOST: valkey
                    REDIS_PORT: "6379"
                    REDIS_TLS: "false"
                    COOKIE_SECRET: ${!COOKIE_SECRET}
                    EMAIL_FROM: ${!EMAIL_FROM}
                    LICENSE_KEY: ${!LICENSE_KEY}
                  depends_on:
                    postgres:
                      condition: service_healthy
                    valkey:
                      condition: service_healthy

              volumes:
                pgdata:
              COMPOSE

              # --- Write .env for docker-compose variable substitution ---
              cat > /opt/mcp-hosting/.env <<DOTENV
              DB_PASSWORD=${!DB_PASSWORD}
              COOKIE_SECRET=${!COOKIE_SECRET}
              DOMAIN_NAME=${DomainName}
              EMAIL_FROM=${!EMAIL_FROM}
              LICENSE_KEY=${LicenseKey}
              DOTENV

              chmod 600 /opt/mcp-hosting/.env

              # --- Start the stack ---
              cd /opt/mcp-hosting
              docker compose up -d

              echo "=== mcp.hosting bootstrap complete ==="
            - EmailFromResolved: !If
                - HasEmailFrom
                - !Ref EmailFrom
                - !Sub "noreply@${DomainName}"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  PublicIp:
    Description: Public IP address of the instance
    Value: !GetAtt Instance.PublicIp

  DNSSetupInstructions:
    Description: DNS setup instructions
    Value: !Sub >-
      Create an A record for ${DomainName} pointing to ${Instance.PublicIp}.
      Also create a wildcard A record for *.${DomainName} pointing to the same IP
      if you want subdomain-based routing. After DNS propagates, the app will be
      accessible at http://${DomainName}. Configure a reverse proxy (e.g. Caddy)
      on the instance for automatic HTTPS.
