AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  mcp.hosting — Production ECS Fargate deployment.
  Provisions VPC, ALB, ECS Fargate service, RDS PostgreSQL, ElastiCache Valkey,
  ACM certificate, and Route53 DNS.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  DomainName:
    Type: String
    Description: Fully-qualified domain name (e.g. mcp.example.com)
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9\-\.]+[a-zA-Z0-9]$
    ConstraintDescription: Must be a valid domain name.

  LicenseKey:
    Type: String
    Default: ""
    Description: Optional license key for proxy features.
    NoEcho: true

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 128
    Description: Password for the RDS PostgreSQL master user.

  EmailFrom:
    Type: String
    Default: ""
    Description: Sender email address. Defaults to noreply@{DomainName} if left empty.

  AppImage:
    Type: String
    Default: ghcr.io/yawlabs/mcp-hosting:latest
    Description: Docker image URI for the mcp-hosting application.

  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
    Description: Number of ECS tasks to run.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasLicenseKey: !Not [!Equals [!Ref LicenseKey, ""]]
  HasEmailFrom: !Not [!Equals [!Ref EmailFrom, ""]]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # VPC
  # =========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "mcp-hosting-${DomainName}"
        - Key: Project
          Value: mcp-hosting

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Project
          Value: mcp-hosting

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # --- Public Subnets (ALB) ---
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: mcp-hosting-public-a
        - Key: Project
          Value: mcp-hosting

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: mcp-hosting-public-b
        - Key: Project
          Value: mcp-hosting

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Project
          Value: mcp-hosting

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # --- NAT Gateway (for private subnet egress) ---
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Project
          Value: mcp-hosting

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Project
          Value: mcp-hosting

  # --- Private Subnets (ECS, RDS, ElastiCache) ---
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: mcp-hosting-private-a
        - Key: Project
          Value: mcp-hosting

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: mcp-hosting-private-b
        - Key: Project
          Value: mcp-hosting

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Project
          Value: mcp-hosting

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # =========================================================================
  # Security Groups
  # =========================================================================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — allow HTTP/HTTPS from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
      Tags:
        - Key: Project
          Value: mcp-hosting

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks — allow traffic from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: ALB to ECS
      Tags:
        - Key: Project
          Value: mcp-hosting

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS — allow traffic from ECS only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: ECS to RDS
      Tags:
        - Key: Project
          Value: mcp-hosting

  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ElastiCache — allow traffic from ECS only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: ECS to Valkey
      Tags:
        - Key: Project
          Value: mcp-hosting

  # =========================================================================
  # Route53 Hosted Zone
  # =========================================================================
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      HostedZoneConfig:
        Comment: !Sub "mcp.hosting zone for ${DomainName}"

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID

  WildcardDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "*.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID

  # =========================================================================
  # ACM Certificate (DNS-validated)
  # =========================================================================
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "*.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZone
        - DomainName: !Sub "*.${DomainName}"
          HostedZoneId: !Ref HostedZone
      Tags:
        - Key: Project
          Value: mcp-hosting

  # =========================================================================
  # Application Load Balancer
  # =========================================================================
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: mcp-hosting-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Project
          Value: mcp-hosting

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: mcp-hosting-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Project
          Value: mcp-hosting

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # =========================================================================
  # Secrets Manager
  # =========================================================================
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "mcp-hosting/${DomainName}/app"
      Description: mcp.hosting application secrets
      SecretString: !Sub |
        {
          "COOKIE_SECRET": "${AWS::StackId}-cookie-rotate-me",
          "LICENSE_KEY": "${LicenseKey}"
        }
      Tags:
        - Key: Project
          Value: mcp-hosting

  # =========================================================================
  # RDS PostgreSQL
  # =========================================================================
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: mcp-hosting private subnets
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: Project
          Value: mcp-hosting

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: mcp-hosting-db
      Engine: postgres
      EngineVersion: "18"
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: 20
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: mcp_admin
      MasterUserPassword: !Ref DBPassword
      DBName: mcp_hosting
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref RDSSubnetGroup
      MultiAZ: false
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      DeletionProtection: true
      Tags:
        - Key: Project
          Value: mcp-hosting

  # =========================================================================
  # ElastiCache Valkey
  # =========================================================================
  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: mcp-hosting private subnets
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  ValkeyCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: mcp-hosting-valkey
      Engine: valkey
      CacheNodeType: cache.t4g.micro
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      VpcSecurityGroupIds:
        - !Ref CacheSecurityGroup
      Tags:
        - Key: Project
          Value: mcp-hosting

  # =========================================================================
  # ECS Cluster, Task Definition, Service
  # =========================================================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: mcp-hosting
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: mcp-hosting

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/mcp-hosting
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: mcp-hosting

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecret
      Tags:
        - Key: Project
          Value: mcp-hosting

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Project
          Value: mcp-hosting

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: mcp-hosting-app
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref AppImage
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: BASE_DOMAIN
              Value: !Ref DomainName
            - Name: DATABASE_URL
              Value: !Sub
                - "postgresql://mcp_admin:${DBPassword}@${RDSEndpoint}:5432/mcp_hosting?sslmode=require"
                - RDSEndpoint: !GetAtt RDSInstance.Endpoint.Address
            - Name: DATABASE_SSL
              Value: "require"
            - Name: REDIS_HOST
              Value: !GetAtt ValkeyCluster.RedisEndpoint.Address
            - Name: REDIS_PORT
              Value: !GetAtt ValkeyCluster.RedisEndpoint.Port
            - Name: REDIS_TLS
              Value: "false"
            - Name: EMAIL_FROM
              Value: !If
                - HasEmailFrom
                - !Ref EmailFrom
                - !Sub "noreply@${DomainName}"
          Secrets:
            - Name: COOKIE_SECRET
              ValueFrom: !Sub "${AppSecret}:COOKIE_SECRET::"
            - Name: LICENSE_KEY
              ValueFrom: !Sub "${AppSecret}:LICENSE_KEY::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
      Tags:
        - Key: Project
          Value: mcp-hosting

  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - ALBListenerHTTPS
      - RDSInstance
      - ValkeyCluster
    Properties:
      ServiceName: mcp-hosting-app
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3000
          TargetGroupArn: !Ref ALBTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      Tags:
        - Key: Project
          Value: mcp-hosting

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ALBDnsName:
    Description: ALB DNS name (use for CNAME if not using Route53)
    Value: !GetAtt ALB.DNSName

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  ValkeyEndpoint:
    Description: ElastiCache Valkey endpoint
    Value: !GetAtt ValkeyCluster.RedisEndpoint.Address

  NameServers:
    Description: >-
      Delegate your domain to these name servers in your registrar.
      The ACM certificate will not validate until DNS delegation is complete.
    Value: !Join
      - ", "
      - !GetAtt HostedZone.NameServers

  ECSClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster

  LogGroupName:
    Description: CloudWatch log group for the ECS tasks
    Value: !Ref LogGroup
