name: PR Deploy Test

on:
  pull_request:
    paths:
      - "cloudformation/**"
      - "terraform/aws/**"
      - "docker-compose/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-deploy-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-and-test:
    name: Test Changed Templates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed templates
        id: changes
        run: |
          templates=""
          changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD 2>/dev/null || git diff --name-only HEAD~1)

          if echo "$changed_files" | grep -q "^cloudformation/ec2/"; then
            templates="${templates:+$templates,}cfn-ec2"
          fi
          if echo "$changed_files" | grep -q "^cloudformation/ecs-fargate/"; then
            templates="${templates:+$templates,}cfn-ecs-fargate"
          fi
          if echo "$changed_files" | grep -q "^terraform/aws/"; then
            templates="${templates:+$templates,}terraform-aws"
          fi
          if echo "$changed_files" | grep -q "^docker-compose/"; then
            templates="${templates:+$templates,}docker-compose"
          fi

          echo "templates=$templates" >> "$GITHUB_OUTPUT"
          echo "has_changes=$( [[ -n "$templates" ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.changes.outputs.has_changes == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Configure AWS credentials
        if: steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.templates != 'docker-compose'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        if: steps.changes.outputs.has_changes == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Run deploy tests for changed templates
        if: steps.changes.outputs.has_changes == 'true'
        id: test
        run: |
          IFS=',' read -ra TEMPLATES <<< "${{ steps.changes.outputs.templates }}"
          exit_code=0
          for template in "${TEMPLATES[@]}"; do
            bash test.sh --template="$template" --results-dir=test-results || exit_code=$?
          done
          exit $exit_code
        env:
          AWS_REGION: us-east-1
          TEST_DOMAIN: ${{ vars.TEST_DOMAIN }}
          TEST_DOMAIN_ZONE_ID: ${{ vars.TEST_DOMAIN_ZONE_ID }}

      - name: Comment results on PR
        if: always() && steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let results;
            try {
              results = JSON.parse(fs.readFileSync('test-results/latest.json', 'utf8'));
            } catch {
              results = { summary: 'No results generated', results: [] };
            }

            const rows = results.results?.map(r => {
              const icon = r.status === 'pass' ? ':white_check_mark:' : r.status === 'fail' ? ':x:' : ':construction:';
              return `| ${icon} ${r.template} | ${r.status} | ${r.duration}s | ${r.notes || ''} |`;
            }).join('\n') || 'No templates tested.';

            const body = `## Deploy Test Results

            | Template | Status | Duration | Notes |
            |---|---|---|---|
            ${rows}

            **Summary:** ${results.summary || 'N/A'}
            `;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('## Deploy Test Results'));

            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

      - name: Emergency cleanup
        if: always()
        run: bash test.sh --cleanup-only
        env:
          AWS_REGION: us-east-1
