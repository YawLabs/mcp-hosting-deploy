name: Deploy Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: "Single target to run (docker-compose, helm, fly, cloudrun) or empty for all"
        default: ""
      image:
        description: "App image to test against"
        default: "ghcr.io/yawlabs/mcp-hosting:latest"

concurrency:
  group: deploy-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read  # needed to pull the private ghcr.io/yawlabs/mcp-hosting image

jobs:
  test:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [docker-compose, helm, fly, cloudrun]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        if: matrix.target == 'cloudrun'
        run: pip install yamllint

      - name: Set up Helm
        if: matrix.target == 'helm'
        uses: azure/setup-helm@v4

      # GHCR login for the docker-compose E2E which pulls the private
      # ghcr.io/yawlabs/mcp-hosting image. GITHUB_TOKEN here only works
      # because the YawLabs org has granted mcp-hosting-deploy read
      # access on the mcp-hosting package — one-time org-admin click
      # documented in mcp-hosting/docs/ops/ghcr-service-pat-setup.md.
      # If this step fails with "unauthorized", that grant hasn't
      # landed yet or was revoked; check
      # https://github.com/orgs/YawLabs/packages/container/mcp-hosting/settings
      # → Manage Actions access.
      - name: Log in to GHCR
        if: matrix.target == 'docker-compose'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run target
        run: bash test.sh --target=${{ matrix.target }}
        env:
          IMAGE: ${{ github.event.inputs.image || 'ghcr.io/yawlabs/mcp-hosting:latest' }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.target }}
          path: test-results/
          if-no-files-found: ignore
