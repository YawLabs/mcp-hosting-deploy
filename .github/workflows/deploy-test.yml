name: Deploy Tests

# Offline/schema-only smoke tests for the shipped deploy paths — fast,
# no secrets, runs on every PR and push.
#
# The docker-compose E2E (full pull + boot + /health) runs out-of-band
# on mcp-build as an hourly systemd timer, logging to
# /var/log/mcp-deploy-test.log. That avoids the GHCR private-image
# auth friction in GHA and reuses infra we already maintain.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: "Single target to run (helm, fly, cloudrun) or empty for all"
        default: ""

concurrency:
  group: deploy-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [helm, fly, cloudrun]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        if: matrix.target == 'cloudrun'
        run: pip install yamllint

      - name: Set up Helm
        if: matrix.target == 'helm'
        uses: azure/setup-helm@v5

      - name: Run target
        run: bash test.sh --target=${{ matrix.target }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.target }}
          path: test-results/
          if-no-files-found: ignore
