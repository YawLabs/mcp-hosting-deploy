name: Release
on:
  push:
    tags: ['v*']
  # workflow_dispatch lets us re-fire the release manually for an
  # existing tag (e.g. when an admin-bypassed tag push reports
  # startup_failure with 0s runtime and no logs — the workflow is
  # fine, the auto-trigger just got eaten by tag-protection rulesets).
  # Fire with: gh workflow run release.yml -f tag=v0.2.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.2.0). Must already exist on the repo.'
        required: true
        type: string

# Tag-driven release workflow. Bump helm/mcp-hosting/Chart.yaml's
# `version`, commit, then `git tag vX.Y.Z && git push --tags`. This
# workflow:
#
#   1. Verifies the tag matches Chart.yaml so the published chart and
#      the GitHub release agree.
#   2. Packages and pushes the chart at the pinned version to GHCR
#      OCI (oci://ghcr.io/yawlabs/charts) — operators can then
#      `helm pull` that exact version forever.
#   3. Generates release notes from `git log` since the previous tag
#      and creates a GitHub Release that operators can subscribe to
#      for upgrade notifications.
#
# The publish-helm.yml workflow continues to push commit-pinned
# preview charts (vX.Y.Z+sha) on every master push for testers; this
# workflow is the canonical source of named releases.

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      packages: write
    steps:
      # Resolve the ref we should check out and release against. For
      # tag-push events GITHUB_REF is already refs/tags/vX.Y.Z. For
      # manual workflow_dispatch we read inputs.tag and check that out
      # explicitly so the rest of the steps see the tagged tree, not
      # the default branch.
      - name: Resolve release ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ inputs.tag }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$REF" =~ ^v[0-9] ]]; then
            echo "::error::Expected tag of shape vX.Y.Z, got '${REF}'."
            exit 1
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Verify tag matches Chart.yaml version
        id: version
        run: |
          TAG="${{ steps.ref.outputs.version }}"
          CHART_VERSION=$(grep '^version:' helm/mcp-hosting/Chart.yaml | awk '{print $2}')
          if [[ "$TAG" != "$CHART_VERSION" ]]; then
            echo "::error::Tag v${TAG} does not match Chart.yaml version ${CHART_VERSION}."
            echo "::error::Bump helm/mcp-hosting/Chart.yaml first, then re-tag."
            exit 1
          fi
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${TAG}"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push pinned chart
        run: |
          helm package helm/mcp-hosting \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}"
          helm push "mcp-hosting-${{ steps.version.outputs.version }}.tgz" oci://ghcr.io/yawlabs/charts

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${{ steps.ref.outputs.ref }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n1 || true)
          {
            if [[ -n "$PREV_TAG" ]]; then
              echo "## Changes since ${PREV_TAG}"
              echo
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD"
            else
              echo "Initial tagged release."
            fi
            echo
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "helm pull oci://ghcr.io/yawlabs/charts/mcp-hosting --version ${{ steps.version.outputs.version }}"
            echo '```'
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag_name pinned explicitly so workflow_dispatch (which runs
          # with GITHUB_REF=refs/heads/master) still attaches the
          # release to the correct vX.Y.Z tag.
          tag_name: ${{ steps.ref.outputs.ref }}
          body_path: release-notes.md
          name: ${{ steps.ref.outputs.ref }}
          draft: false
          prerelease: false
