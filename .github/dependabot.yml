version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Keep Docker base images up to date
  - package-ecosystem: docker
    directory: /docker-compose
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
