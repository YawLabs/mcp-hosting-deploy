<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mcp.hosting — Deploy Verification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #24292f;
      background: #fff;
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: #656d76; font-size: 14px; margin-bottom: 32px; }
    .summary {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 16px;
      margin-bottom: 24px;
    }
    .summary.pass { background: #dafbe1; color: #1a7f37; }
    .summary.fail { background: #ffebe9; color: #cf222e; }
    .summary.loading { background: #f6f8fa; color: #656d76; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      font-weight: 600;
      padding: 8px 12px;
      border-bottom: 2px solid #d0d7de;
    }
    td { padding: 8px 12px; border-bottom: 1px solid #d0d7de; }
    .status {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .status-pass { background: #dafbe1; color: #1a7f37; }
    .status-fail { background: #ffebe9; color: #cf222e; }
    .status-todo { background: #f6f8fa; color: #656d76; }
    .meta {
      margin-top: 32px;
      font-size: 12px;
      color: #656d76;
    }
    .meta a { color: #0969da; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }
    .error { color: #cf222e; font-size: 14px; margin: 24px 0; }
  </style>
</head>
<body>
  <h1>mcp.hosting</h1>
  <p class="subtitle">Deploy template verification</p>

  <div id="summary" class="summary loading">Loading...</div>

  <table>
    <thead>
      <tr>
        <th>Template</th>
        <th>Status</th>
        <th>Duration</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="results">
      <tr><td colspan="4" style="color:#656d76">Loading results...</td></tr>
    </tbody>
  </table>

  <div class="meta" id="meta"></div>

  <script>
    const RESULTS_URL =
      'https://raw.githubusercontent.com/YawLabs/mcp-hosting-deploy/master/test-results/latest.json';

    async function load() {
      try {
        const res = await fetch(RESULTS_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        render(data);
      } catch (err) {
        document.getElementById('summary').className = 'summary fail';
        document.getElementById('summary').textContent = 'Could not load results';
        document.getElementById('results').innerHTML =
          `<tr><td colspan="4" class="error">Failed to fetch results: ${err.message}</td></tr>`;
      }
    }

    function render(data) {
      const el = document.getElementById('summary');
      const hasFail = data.results.some(r => r.status === 'fail');
      el.className = `summary ${hasFail ? 'fail' : 'pass'}`;
      el.textContent = data.summary;

      const tbody = document.getElementById('results');
      tbody.innerHTML = data.results.map(r => {
        const cls = `status status-${r.status}`;
        const label = r.status === 'pass' ? 'pass' : r.status === 'fail' ? 'fail' : 'todo';
        const dur = r.duration > 0 ? `${r.duration}s` : '--';
        return `<tr>
          <td>${r.template}</td>
          <td><span class="${cls}">${label}</span></td>
          <td>${dur}</td>
          <td>${r.notes || ''}</td>
        </tr>`;
      }).join('');

      const ts = new Date(data.timestamp).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });

      document.getElementById('meta').innerHTML = `
        Last tested: ${ts} &middot;
        Commit: <a href="https://github.com/YawLabs/mcp-hosting-deploy/commit/${data.commit}">${data.commit}</a> &middot;
        <a href="https://github.com/YawLabs/mcp-hosting-deploy/actions/workflows/deploy-test.yml">View CI runs</a>
      `;
    }

    load();
  </script>
</body>
</html>
