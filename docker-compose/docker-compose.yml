services:
  # ---------------------------------------------------------------------------
  # mcp-hosting-app -- the main platform container
  # ---------------------------------------------------------------------------
  mcp-hosting-app:
    image: ghcr.io/yawlabs/mcp-hosting:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Declares this instance as a self-host so the app refuses to boot
      # without a valid MCP_HOSTING_LICENSE_KEY (prevents accidental
      # bypass where an unset key would leave the app thinking it's
      # running as hosted mcp.hosting). Default on — operators should
      # not override this in production. Scoped overridable only so CI
      # smoke tests can exercise image-boot + stack connectivity
      # without having to mock the license API.
      - SELF_HOSTED=${SELF_HOSTED:-true}
      - DATABASE_URL=${DATABASE_URL}
      # The bundled postgres:18 container has no TLS; connections stay on
      # the compose network. Operators pointing at external managed
      # Postgres (RDS, Cloud SQL, etc.) should unset this.
      - DATABASE_SSL=false
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_AUTH_TOKEN=${REDIS_AUTH_TOKEN:-}
      # Bundled valkey:8 has no TLS; traffic stays on the compose network.
      # Operators pointing at managed ElastiCache/Upstash should unset this.
      - REDIS_TLS=false
      - MCP_HOSTING_LICENSE_KEY=${MCP_HOSTING_LICENSE_KEY:-}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - BASE_URL=${BASE_URL}
      - BASE_DOMAIN=${DOMAIN}
      - EMAIL_FROM=${EMAIL_FROM}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # postgres -- PostgreSQL 18
  # ---------------------------------------------------------------------------
  postgres:
    # pgvector/pgvector:pg18 is postgres:18 with the pgvector extension
    # pre-installed. The app's migrations run `CREATE EXTENSION IF NOT
    # EXISTS vector` on startup for the Voyage semantic-rerank feature;
    # plain postgres:18 doesn't ship pgvector, so the app crash-loops
    # before ever binding /health.
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mcphosting}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mcphosting}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcphosting}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # redis -- Valkey 8 (Redis-compatible)
  # ---------------------------------------------------------------------------
  redis:
    image: valkey/valkey:8
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # caddy -- TLS termination & reverse proxy
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mcp-hosting-app

networks:
  default:
    name: mcp-hosting
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
