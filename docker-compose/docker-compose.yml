services:
  # ---------------------------------------------------------------------------
  # mcp-hosting-app -- the main platform container
  # ---------------------------------------------------------------------------
  mcp-hosting-app:
    image: ghcr.io/yawlabs/mcp-hosting:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Declares this instance as a self-host so the app refuses to boot
      # without a valid MCP_HOSTING_LICENSE_KEY (prevents accidental
      # bypass where an unset key would leave the app thinking it's
      # running as hosted mcp.hosting). Default on — operators should
      # not override this in production. Scoped overridable only so CI
      # smoke tests can exercise image-boot + stack connectivity
      # without having to mock the license API.
      - SELF_HOSTED=${SELF_HOSTED:-true}
      - DATABASE_URL=${DATABASE_URL}
      # The bundled postgres:18 container has no TLS; connections stay on
      # the compose network. Operators pointing at external managed
      # Postgres (RDS, Cloud SQL, etc.) should unset this.
      - DATABASE_SSL=false
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_AUTH_TOKEN=${REDIS_AUTH_TOKEN:-}
      # Bundled valkey:8 has no TLS; traffic stays on the compose network.
      # Operators pointing at managed ElastiCache/Upstash should unset this.
      - REDIS_TLS=false
      - MCP_HOSTING_LICENSE_KEY=${MCP_HOSTING_LICENSE_KEY:-}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - BASE_DOMAIN=${DOMAIN}
      - EMAIL_FROM=${EMAIL_FROM}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # postgres -- PostgreSQL 18
  # ---------------------------------------------------------------------------
  postgres:
    # pgvector/pgvector:pg18 is postgres:18 with the pgvector extension
    # pre-installed. The app's migrations run `CREATE EXTENSION IF NOT
    # EXISTS vector` on startup for the Voyage semantic-rerank feature;
    # plain postgres:18 doesn't ship pgvector, so the app crash-loops
    # before ever binding /health.
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mcphosting}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mcphosting}
    volumes:
      # Mount the parent of PGDATA (which the upstream image sets to
      # /var/lib/postgresql/data) rather than PGDATA itself. This is
      # non-standard — the typical pattern is to mount the volume at
      # /var/lib/postgresql/data — but it is what existing deployments
      # are using, and changing it would orphan their on-disk data.
      # Keep as-is; data still persists because it lives inside the
      # mounted parent dir.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcphosting}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # redis -- Valkey 8 (Redis-compatible)
  # ---------------------------------------------------------------------------
  redis:
    image: valkey/valkey:8
    restart: unless-stopped
    # `--requirepass` is mandatory: anything else on the compose network
    # would otherwise have unauthenticated read/write access to the cache
    # (sessions, rate-limit state, token metadata). The ${VAR:?...}
    # interpolation makes `docker compose up` fail loudly if the operator
    # never set REDIS_AUTH_TOKEN in .env, instead of silently booting an
    # open Redis. Generate with: openssl rand -hex 24.
    command:
      - "valkey-server"
      - "--requirepass"
      - "${REDIS_AUTH_TOKEN:?REDIS_AUTH_TOKEN must be set in .env (run: openssl rand -hex 24)}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_AUTH_TOKEN}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # caddy -- TLS termination & reverse proxy
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mcp-hosting-app
    # Caddy is the user-facing component — if it hangs or crashes
    # silently the whole instance looks dead from outside. The probe
    # uses busybox's nc (-z = scan only, no I/O) to verify port 80 is
    # accepting connections; we give it 60s of start-up grace because
    # first-boot Let's Encrypt provisioning can take 30–45s before the
    # listener is ready.
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  default:
    name: mcp-hosting
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
